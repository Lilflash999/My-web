<!-- login.html - Fixed to work with existing accounts -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login • SocialNest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-image: url("cred.jpg"); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .login-container { 
            background: rgba(143,123,100,0.75);
            backdrop-filter: blur(10px);
            border-radius: 32px; 
            padding: 40px 32px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            text-align: center; 
        }
        .logo-icon { 
            width: 70px; 
            height: 70px; 
            background: dimgrey; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 20px; 
        }
        .logo-icon span {
            font-family: 'Fira Code', 'Courier New', monospace; 
            font-weight: 900; 
            font-size: 38px; 
            color: white; 
            letter-spacing: -2px;
        }
        h1 { font-size: 28px; color: #1e293b; margin-bottom: 8px; }
        .subtitle { color: #64748b; margin-bottom: 32px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #334155; font-size: 14px; }
        .input-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 16px; 
            font-size: 15px; 
            outline: none; 
            transition: 0.2s;
        }
        .input-group input:focus { border-color: #667eea; }
        button { 
            width: 100%; 
            padding: 14px; 
            background: green; 
            border: none; 
            border-radius: 40px; 
            color: white; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 8px;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message { 
            background: #fee2e2; 
            color: #dc2626; 
            padding: 12px; 
            border-radius: 12px; 
            margin: 16px 0; 
            font-size: 14px; 
            display: none; 
        }
        .warning-message {
            background: #fef3c7;
            color: #d97706;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 13px;
            display: none;
        }
        .signup-link { margin-top: 24px; color: #64748b; font-size: 14px; }
        .signup-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Verification Modal */
        .verification-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .verification-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .verification-icon { font-size: 64px; margin-bottom: 20px; }
        .verification-title { font-size: 24px; font-weight: 700; margin-bottom: 16px; color: #1e293b; }
        .verification-text { color: #64748b; margin-bottom: 24px; line-height: 1.5; }
        .resend-btn { background: #667eea; margin-top: 16px; }
        .resend-btn:disabled { background: #ccc; }
        .countdown { color: #667eea; font-weight: 600; margin-left: 8px; }
        
/* ========== NARUTO LOADING SCREEN ========== */
.loading-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url("naruto-loading.gif");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
display: flex;
align-items: center;
justify-content: center;
z-index: 99999;
transition: opacity 0.5s ease;
flex-direction: column;
}

/* Dark overlay to make text/bubbles visible */
.loading-overlay::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.4);
z-index: 0;
}

.loading-overlay.hide {
opacity: 0;
pointer-events: none;
}

.loading-balls {
display: flex;
gap: 15px;
align-items: center;
justify-content: center;
position: relative;
z-index: 1;
}

.ball {
width: 20px;
height: 20px;
border-radius: 50%;
background: #f39c12;
animation: bounce 0.6s ease-in-out infinite alternate;
box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
}

.ball:nth-child(1) { animation-delay: 0s; background: #f39c12; }
.ball:nth-child(2) { animation-delay: 0.15s; background: #e74c3c; }
.ball:nth-child(3) { animation-delay: 0.3s; background: #f1c40f; }
.ball:nth-child(4) { animation-delay: 0.45s; background: #e67e22; }
.ball:nth-child(5) { animation-delay: 0.6s; background: #c0392b; }

/* Naruto Text */
.loading-text {
position: relative;
z-index: 1;
margin-top: 30px;
color: white;
font-size: 20px;
font-weight: bold;
text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
font-family: 'Anime', 'Segoe UI', cursive;
letter-spacing: 2px;
}

/* Optional: Add a subtle glow to the text */
.loading-text {
animation: textGlow 1.5s ease-in-out infinite;
}

@keyframes textGlow {
0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
50% { text-shadow: 0 0 10px rgba(243,156,18,0.8); }
}

@keyframes bounce {
0% {
transform: translateY(0px);
opacity: 0.5;
}
100% {
transform: translateY(-30px);
opacity: 1;
}
}
    </style>
</head>
<body>
<!-- Simple Loading Screen -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-balls">
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
        <div class="ball"></div>
    </div>
</div>

<!-- Verification Modal (for unverified users) -->
<div id="verificationModal" class="verification-modal">
    <div class="verification-content">
        <div class="verification-icon">📧</div>
        <div class="verification-title">Verify Your Email</div>
        <div class="verification-text">
            Please verify your email address before logging in.
            <br><br>
            Check your inbox and click the verification link we sent.
        </div>
        <button id="resendVerificationBtn" class="resend-btn">Resend Verification Email</button>
        <button id="closeVerificationModal" style="background: #dc2626; margin-top: 12px;">Close</button>
    </div>
</div>

<div class="login-container">
    <div class="logo-icon"><span>SN</span></div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue to SocialNest</p>
    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Username or Email</label>
            <input type="text" id="usernameOrEmail" placeholder="Enter your username or email" required>
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" id="loginBtn">Login</button>
    </form>
    <div id="errorMessage" class="error-message"></div>
    <div class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
apiKey: "AIzaSyCDrwe_zHHoXDeKZBiKBjoXWkyVCZGoPps",
authDomain: "obinna-web.firebaseapp.com",
databaseURL: "https://obinna-web-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "obinna-web",
storageBucket: "obinna-web.firebasestorage.app",
messagingSenderId: "1066859676740",
appId: "1:1066859676740:web:0479ddb0a1bc9020fe6811"
};
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    const verificationModal = document.getElementById('verificationModal');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    
    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        errorDiv.className = 'error-message';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }
    
    async function resendVerificationEmail(user) {
        try {
            await sendEmailVerification(user);
            showError("✅ Verification email resent! Check your inbox.");
        } catch (error) {
            console.error("Error resending:", error);
            showError("Failed to resend verification email. Please try again.");
        }
    }
    
    document.getElementById('resendVerificationBtn').addEventListener('click', async () => {
        if (auth.currentUser) {
            await resendVerificationEmail(auth.currentUser);
        }
    });
    
    document.getElementById('closeVerificationModal').addEventListener('click', () => {
        verificationModal.style.display = 'none';
        signOut(auth);
    });
    
    // Handle login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailOrUsername = document.getElementById('usernameOrEmail').value.trim();
        const password = document.getElementById('password').value;
        
        errorDiv.style.display = 'none';
        
        if (!emailOrUsername || !password) {
            showError('Please fill all fields');
            return;
        }
        
        // Disable button during login
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
        
        try {
            // First find the email if username was provided
            let userEmail = emailOrUsername;
            
            if (!emailOrUsername.includes('@')) {
                // It's a username, find the email
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const users = snapshot.val();
                
                if (users) {
                    for (const [id, user] of Object.entries(users)) {
                        if (user.username === emailOrUsername) {
                            userEmail = user.email;
                            break;
                        }
                    }
                }
            }
            
            // Attempt login
            const result = await signInWithEmailAndPassword(auth, userEmail, password);
            const user = result.user;
            
            // Check if email is verified (for new accounts)
            // For old accounts (created before verification), we skip this check
            const userRef = ref(db, `users/${user.uid}`);
            const userSnapshot = await get(userRef);
            const userData = userSnapshot.val();
            
            // If account was created with the old system (no emailVerified field), allow login
            // If it's a new account with verification required, check verification
            if (userData && userData.emailVerified === false && !user.emailVerified) {
                // New account that hasn't verified email
                verificationModal.style.display = 'flex';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
                return;
            }
            
            // For existing accounts or verified accounts, proceed
            localStorage.setItem('socialnest_session_active', JSON.stringify({ userId: user.uid }));
            
            // Update user data in database if needed (migration for old accounts)
            if (userData && !userData.hasOwnProperty('emailVerified')) {
                await update(userRef, { emailVerified: true });
            }
            
            errorDiv.style.backgroundColor = '#dcfce7';
            errorDiv.style.color = '#16a34a';
            errorDiv.textContent = '✅ YOU’RE IN! Redirecting...';
            errorDiv.style.display = 'block';
            errorDiv.className = 'error-message';
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
            
        } catch (error) {
            console.error("Login error:", error);
            
            if (error.code === 'user-not-found') {
                showError('Account not found. Please sign up first.');
            } else if (error.code === 'wrong-password') {
                showError('Incorrect password. Please try again.');
            } else if (error.code === 'invalid-email') {
                showError('Invalid email format.');
            } else if (error.code === 'too-many-requests') {
                showError('Too many failed attempts. Try again later.');
            } else {
                showError(error.message || 'Login failed. Please try again.');
            }
            
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    });
    
    // Simple loading controller
function hideLoading() {
const overlay = document.getElementById('loadingOverlay');
if (overlay) {
overlay.classList.add('hide');
setTimeout(() => {
overlay.style.display = 'none';
}, 500);
}
}

// Hide loading when page is ready
window.addEventListener('load', function() {
setTimeout(hideLoading, 800);
});

// Also hide when Firebase is ready
if (window.db) {
setTimeout(hideLoading, 800);
}

// Fallback: hide after 2 seconds max
setTimeout(hideLoading, 2000);
</script>
<script src="rem.js"></script>
</body>
</html>
