<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0 user-scalable=no">
    <title>SocialNest • Watch Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    /* Add these to any page that's not fitting */
html, body {
width: 100%;
overflow-x: hidden;
}

* {
max-width: 100%;
box-sizing: border-box;
}

img, video, iframe {
max-width: 100%;
height: auto;
}

@media (max-width: 768px) {
.container {
padding-left: 12px;
padding-right: 12px;
}
}
    
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; height: 100vh; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        .host-info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px 18px; display: flex; align-items: center; gap: 12px; z-index: 20; }
        .host-avatar { width: 44px; height: 44px; border-radius: 50%; }
        .host-name { color: white; font-weight: 600; }
        .live-badge { background: #ff2e2e; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .action-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; border: none; padding: 12px 28px; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; z-index: 20; }
        .action-btn:disabled { background: #4b5563; cursor: not-allowed; }
        .chat-panel { position: absolute; bottom: 100px; right: 20px; width: 320px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; z-index: 30; }
        .chat-header { padding: 12px 16px; background: rgba(0,0,0,0.5); color: white; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-message { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 18px; font-size: 13px; color: white; }
        .chat-message strong { color: #facc15; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; background: rgba(255,255,255,0.15); border: none; padding: 10px 14px; border-radius: 30px; color: white; outline: none; }
        .chat-input-area button { background: #667eea; border: none; padding: 10px 18px; border-radius: 30px; color: white; cursor: pointer; }
        .toggle-chat { position: absolute; bottom: 110px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #667eea; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 35; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; opacity: 0; transition: 0.2s; }
        @media (max-width: 550px) { .chat-panel { width: calc(100% - 40px); } }
    </style>
</head>
<body>

<div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="host-info"><img id="hostAvatar" class="host-avatar"><div><span class="host-name" id="hostName"></span><span class="live-badge">LIVE</span></div></div>
    <button class="action-btn" id="requestJoinBtn">🎤 Request to Join</button>
    <button class="toggle-chat" id="toggleChatBtn"><i class="fas fa-comment"></i></button>
    <div class="chat-panel" id="chatPanel" style="display: none;">
        <div class="chat-header"><span><i class="fas fa-comments"></i> Live Chat</span><button id="closeChatBtn" style="background:none; border:none; color:white; font-size:20px;">✕</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Say something..."><button id="sendChatBtn">Send</button></div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCDrwe_zHHoXDeKZBiKBjoXWkyVCZGoPps",
        authDomain: "obinna-web.firebaseapp.com",
        databaseURL: "https://obinna-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "obinna-web",
        storageBucket: "obinna-web.firebasestorage.app",
        messagingSenderId: "1066859676740",
        appId: "1:1066859676740:web:0479ddb0a1bc9020fe6811"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let liveStreamId = null;
    let peerConnection = null;
    const configuration = { 
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    function showToast(msg, isError = false) {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.style.background = isError ? '#dc2626' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    const urlParams = new URLSearchParams(window.location.search);
    liveStreamId = urlParams.get('id');

    async function loadLiveStream() {
        if (!liveStreamId) { showToast("Invalid stream", true); setTimeout(() => window.location.href = 'dashboard.html', 1500); return; }
        const streamRef = ref(db, `liveStreams/${liveStreamId}`);
        const snap = await get(streamRef);
        if (!snap.exists() || !snap.val().active) { showToast("Stream ended", true); setTimeout(() => window.location.href = 'dashboard.html', 1500); return; }
        const stream = snap.val();
        document.getElementById('hostName').innerText = stream.hostName;
        document.getElementById('hostAvatar').src = stream.hostProfilePic || 'https://ui-avatars.com/api/';

        // Listen for chat
        onValue(ref(db, `liveStreams/${liveStreamId}/chat`), (snap) => {
            const msgs = snap.val() || {};
            renderChat(msgs);
        });

        // Listen for host's offer
        const viewerRef = ref(db, `liveStreams/${liveStreamId}/viewers/${currentUser.uid}`);
        onValue(viewerRef, (snap) => {
            const data = snap.val();
            if (data && data.offer && !peerConnection) {
                establishCall(data.offer);
            }
        });
    }

    async function establishCall(offer) {
        try {
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    showToast("✅ Connected to host stream!");
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const candRef = ref(db, `liveStreams/${liveStreamId}/viewers/${currentUser.uid}/iceCandidates`);
                    push(candRef, event.candidate.toJSON());
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                console.log("ICE connection state:", peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'connected') {
                    showToast("✅ Connected to live stream!");
                } else if (peerConnection.iceConnectionState === 'failed') {
                    showToast("❌ Connection failed. Please refresh.", true);
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await update(ref(db, `liveStreams/${liveStreamId}/viewers/${currentUser.uid}`), {
                answer: { type: answer.type, sdp: answer.sdp }
            });
        } catch (err) {
            console.error("Establish call error:", err);
            showToast("Failed to connect: " + err.message, true);
        }
    }

    async function requestToJoin() {
        if (!liveStreamId) return;
        await push(ref(db, `liveStreams/${liveStreamId}/joinRequests`), {
            userId: currentUser.uid,
            userName: currentUser.displayName || currentUser.username,
            userProfilePic: currentUser.profilePic,
            timestamp: Date.now()
        });
        showToast("Request sent. Waiting for host to accept.");
        document.getElementById('requestJoinBtn').disabled = true;
        document.getElementById('requestJoinBtn').innerHTML = '⏳ Requested';
    }

    async function sendChatMessage(text) {
        if (!text.trim() || !liveStreamId) return;
        await push(ref(db, `liveStreams/${liveStreamId}/chat`), {
            userId: currentUser.uid,
            userName: currentUser.displayName || currentUser.username,
            text: text.trim(),
            timestamp: Date.now()
        });
        document.getElementById('chatInput').value = '';
    }

    function renderChat(msgs) {
        const container = document.getElementById('chatMessages');
        const messages = Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp);
        container.innerHTML = messages.map(m => `<div class="chat-message"><strong>${escapeHtml(m.userName)}</strong>: ${escapeHtml(m.text)}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }

    document.getElementById('requestJoinBtn').onclick = requestToJoin;
    document.getElementById('sendChatBtn').onclick = () => sendChatMessage(document.getElementById('chatInput').value);
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(e.target.value); });
    const toggleChat = document.getElementById('toggleChatBtn'), chatPanel = document.getElementById('chatPanel'), closeChat = document.getElementById('closeChatBtn');
    toggleChat.onclick = () => chatPanel.style.display = chatPanel.style.display === 'flex' ? 'none' : 'flex';
    closeChat.onclick = () => chatPanel.style.display = 'none';

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await get(ref(db, `users/${user.uid}`));
            currentUser = { uid: user.uid, ...userSnap.val() };
            if (!currentUser.displayName) currentUser.displayName = currentUser.username;
            await loadLiveStream();
        } else window.location.href = 'login.html';
    });
</script>
</body>
</html>
