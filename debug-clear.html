<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Debug Tool • Clear User Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Add these to any page that's not fitting */
html, body {
width: 100%;
overflow-x: hidden;
}

* {
max-width: 100%;
box-sizing: border-box;
}

img, video, iframe {
max-width: 100%;
height: auto;
}

@media (max-width: 768px) {
.container {
padding-left: 12px;
padding-right: 12px;
}
}
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .warning {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
            color: #991b1b;
        }
        .input-group {
            margin: 16px 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            font-size: 16px;
        }
        button.secondary {
            background: #10b981;
        }
        button.warning {
            background: #ea580c;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            font-size: 14px;
        }
        
        /* Searchable Select Styles */
        .searchable-select {
            position: relative;
            width: 100%;
        }
        
        .select-button {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            font-size: 14px;
            color: #64748b;
        }
        
        .select-button:hover {
            border-color: #667eea;
        }
        
        .select-button.active {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .select-button::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.2s;
        }
        
        .select-button.active::after {
            transform: rotate(180deg);
        }
        
        .select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-top: 8px;
            z-index: 100;
            display: none;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        
        .select-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid #e2e8f0;
            outline: none;
            font-size: 14px;
        }
        
        .search-box:focus {
            background: #f8fafc;
        }
        
        .options-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .option-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .option-item:hover {
            background: #f1f5f9;
        }
        
        .option-item.selected {
            background: #ede9fe;
            color: #667eea;
        }
        
        .option-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .option-info {
            flex: 1;
        }
        
        .option-name {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }
        
        .option-username {
            font-size: 11px;
            color: #64748b;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        
        .no-results {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        
        .selected-user-info {
            margin-top: 12px;
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .selected-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .selected-name {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }
        
        .selected-username {
            font-size: 11px;
            color: #64748b;
        }
        
        .main-btn {
            position: fixed;
        }
        
        .main-btn i {
            color: black;
            font-size: 30px;
            transition: transform 0.3s ease;
        }
        .main-btn:hover i {
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

        <div class="main-btn">
            <button onclick="window.location.href='admin-users.html'" style=" background: transparent; border: none; cursor: pointer; width: 100%; height: 100%;"><i class="fas fa-arrow-left fa-fw"></i></button>
        </div>
        
<div class="container">
    <div class="card">
        <h1>🔧 Debug Tool</h1>
        <p style="color: #64748b;">Clear user data for testing</p>
        
        <div class="warning">
            ⚠️ <strong>WARNING:</strong> This action is <strong>IRREVERSIBLE</strong>. 
            All selected user data will be permanently deleted.
        </div>
        
        <div class="input-group">
            <label>👤 Select User:</label>
            <div class="searchable-select">
                <div class="select-button" id="selectButton">
                    <em id="selectedDisplay">select user...</em>
                </div>
                <div class="select-dropdown" id="selectDropdown">
                    <input type="text" class="search-box" id="searchInput" placeholder="Search by name or username...">
                    <div class="options-list" id="optionsList">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i> Loading users...
                        </div>
                    </div>
                </div>
            </div>
            <div class="selected-user-info" id="selectedUserInfo" style="display: none;">
                <img id="selectedAvatar" class="selected-avatar" src="">
                <div>
                    <div class="selected-name" id="selectedName"></div>
                    <div class="selected-username" id="selectedUsername"></div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>🗑️ What to clear:</label>
            <select id="clearType">
                <option value="all">🔥 ALL DATA (chats, friends, posts, requests)</option>
                <option value="chats">💬 Only Chats</option>
                <option value="friends">👥 Only Friends & Friend Requests</option>
                <option value="posts">📝 Only Posts</option>
                <option value="notifications">🔔 Only Notifications</option>
            </select>
        </div>
        
        <button id="clearBtn">🗑️ Clear Selected Data</button>
        <button id="clearAllUsersBtn" class="warning" style="margin-top: 12px;">⚠️ Clear ALL Users Data (Admin Only)</button>
    </div>
    
    <div id="result" class="result"></div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, remove, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCDrwe_zHHoXDeKZBiKBjoXWkyVCZGoPps",
        authDomain: "obinna-web.firebaseapp.com",
        databaseURL: "https://obinna-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "obinna-web",
        storageBucket: "obinna-web.firebasestorage.app",
        messagingSenderId: "1066859676740",
        appId: "1:1066859676740:web:0479ddb0a1bc9020fe6811"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    const ADMIN_UID = "6JkPCRetiCOX65opu4ofqAiTXaY2";
    let currentUser = null;
    let allUsers = [];
    let selectedUserId = null;
    
    // DOM Elements
    const selectButton = document.getElementById('selectButton');
    const selectDropdown = document.getElementById('selectDropdown');
    const searchInput = document.getElementById('searchInput');
    const optionsList = document.getElementById('optionsList');
    const selectedUserInfo = document.getElementById('selectedUserInfo');
    const selectedDisplay = document.getElementById('selectedDisplay');
    const selectedAvatar = document.getElementById('selectedAvatar');
    const selectedName = document.getElementById('selectedName');
    const selectedUsername = document.getElementById('selectedUsername');
    
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = isError ? '#dc2626' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // Fetch all users
    async function fetchAllUsers() {
        try {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const users = snapshot.val() || {};
            
            allUsers = [];
            for (const [uid, user] of Object.entries(users)) {
                allUsers.push({
                    uid: uid,
                    displayName: user.displayName || user.username || 'Unknown User',
                    username: user.username || 'user',
                    profilePic: user.profilePic || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(user.displayName || 'U')}`,
                    bio: user.bio || ''
                });
            }
            
            allUsers.sort((a, b) => a.displayName.localeCompare(b.displayName));
            renderOptions('');
            return allUsers;
        } catch (error) {
            console.error("Error fetching users:", error);
            optionsList.innerHTML = '<div class="no-results">Error loading users</div>';
            return [];
        }
    }
    
    // Render options
    function renderOptions(searchTerm = '') {
        if (allUsers.length === 0) {
            optionsList.innerHTML = '<div class="loading-spinner">No users found</div>';
            return;
        }
        
        const filteredUsers = allUsers.filter(user => 
            user.displayName.toLowerCase().includes(searchTerm.toLowerCase()) ||
            user.username.toLowerCase().includes(searchTerm.toLowerCase())
        );
        
        if (filteredUsers.length === 0) {
            optionsList.innerHTML = '<div class="no-results">No users match your search</div>';
            return;
        }
        
        optionsList.innerHTML = filteredUsers.map(user => `
            <div class="option-item" data-uid="${user.uid}" data-name="${escapeHtml(user.displayName)}" data-username="${escapeHtml(user.username)}" data-avatar="${user.profilePic}">
                <img class="option-avatar" src="${user.profilePic}" onerror="this.src='https://ui-avatars.com/api/?background=667eea&color=fff'">
                <div class="option-info">
                    <div class="option-name">${escapeHtml(user.displayName)}</div>
                    <div class="option-username">@${escapeHtml(user.username)}</div>
                </div>
            </div>
        `).join('');
        
        // Add click listeners
        document.querySelectorAll('.option-item').forEach(option => {
            option.addEventListener('click', () => {
                const uid = option.dataset.uid;
                const name = option.dataset.name;
                const username = option.dataset.username;
                const avatar = option.dataset.avatar;
                selectUser(uid, name, username, avatar);
            });
        });
    }
    
    // Select a user
    function selectUser(uid, name, username, avatar) {
        selectedUserId = uid;
        selectedDisplay.innerHTML = `<strong>${escapeHtml(name)}</strong> @${escapeHtml(username)}`;
        selectedAvatar.src = avatar;
        selectedName.textContent = name;
        selectedUsername.textContent = `@${username}`;
        selectedUserInfo.style.display = 'flex';
        selectDropdown.classList.remove('show');
        selectButton.classList.remove('active');
    }
    
    // Toggle dropdown
    selectButton.addEventListener('click', (e) => {
        e.stopPropagation();
        selectDropdown.classList.toggle('show');
        selectButton.classList.toggle('active');
        if (selectDropdown.classList.contains('show')) {
            searchInput.focus();
        }
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!selectButton.contains(e.target) && !selectDropdown.contains(e.target)) {
            selectDropdown.classList.remove('show');
            selectButton.classList.remove('active');
        }
    });
    
    // Search filter
    searchInput.addEventListener('input', (e) => {
        renderOptions(e.target.value);
    });
    
    // ========== CLEAR FUNCTIONS ==========
    
    async function clearUserChats(userId) {
        const messagesRef = ref(db, 'messages');
        const snapshot = await get(messagesRef);
        const messages = snapshot.val() || {};
        let deletedCount = 0;
        
        for (const [chatId, chatMessages] of Object.entries(messages)) {
            if (chatId.includes(userId)) {
                await remove(ref(db, `messages/${chatId}`));
                deletedCount++;
            }
        }
        return deletedCount;
    }
    
    async function clearUserFriendsAndRequests(userId) {
        await remove(ref(db, `users/${userId}/friends`));
        await remove(ref(db, `users/${userId}/friendRequests`));
        
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        const users = snapshot.val() || {};
        let cleanedCount = 0;
        
        for (const [otherId, otherUser] of Object.entries(users)) {
            let updated = false;
            
            if (otherUser.friends && otherUser.friends.includes(userId)) {
                const newFriends = otherUser.friends.filter(id => id !== userId);
                await remove(ref(db, `users/${otherId}/friends`));
                if (newFriends.length > 0) {
                    await set(ref(db, `users/${otherId}/friends`), newFriends);
                }
                updated = true;
            }
            
            if (otherUser.friendRequests && otherUser.friendRequests.includes(userId)) {
                const newRequests = otherUser.friendRequests.filter(id => id !== userId);
                await remove(ref(db, `users/${otherId}/friendRequests`));
                if (newRequests.length > 0) {
                    await set(ref(db, `users/${otherId}/friendRequests`), newRequests);
                }
                updated = true;
            }
            
            if (updated) cleanedCount++;
        }
        
        return cleanedCount;
    }
    
    async function clearUserPosts(userId) {
        const postsRef = ref(db, 'posts');
        const snapshot = await get(postsRef);
        const posts = snapshot.val() || {};
        let deletedCount = 0;
        
        for (const [postId, post] of Object.entries(posts)) {
            if (post.userId === userId) {
                await remove(ref(db, `posts/${postId}`));
                deletedCount++;
            }
        }
        return deletedCount;
    }
    
    async function clearUserNotifications(userId) {
        await remove(ref(db, `notifications/${userId}`));
        return true;
    }
    
    async function clearAllUserData(userId) {
        const results = {
            chats: await clearUserChats(userId),
            friends: await clearUserFriendsAndRequests(userId),
            posts: await clearUserPosts(userId),
            notifications: await clearUserNotifications(userId)
        };
        return results;
    }
    
    async function clearAllUsersData() {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        const users = snapshot.val() || {};
        let totalCleared = 0;
        
        for (const userId of Object.keys(users)) {
            if (userId !== ADMIN_UID) {
                await clearAllUserData(userId);
                totalCleared++;
            }
        }
        
        return totalCleared;
    }
    
    function displayResult(results, userId) {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        
        let html = `<strong>✅ Results for user: ${userId.substring(0,12)}...</strong><br><br>`;
        html += `<div style="margin-top: 10px;">`;
        
        if (results.chats !== undefined) {
            html += `💬 Chats cleared: ${results.chats} chat(s)<br>`;
        }
        if (results.friends !== undefined) {
            html += `👥 Friends/Requests cleared<br>`;
        }
        if (results.posts !== undefined) {
            html += `📝 Posts cleared: ${results.posts} post(s)<br>`;
        }
        if (results.notifications !== undefined) {
            html += `🔔 Notifications cleared<br>`;
        }
        
        html += `</div>`;
        resultDiv.innerHTML = html;
        resultDiv.classList.add('success');
        
        setTimeout(() => {
            resultDiv.classList.remove('success');
        }, 5000);
    }
    
    document.getElementById('clearBtn').addEventListener('click', async () => {
        if (!selectedUserId) {
            showToast("Please select a user first", true);
            return;
        }
        
        const clearType = document.getElementById('clearType').value;
        
        if (!confirm(`⚠️ Are you sure you want to clear ${clearType} for user ${selectedUserId.substring(0,12)}...? This cannot be undone!`)) {
            return;
        }
        
        try {
            let results = {};
            
            switch(clearType) {
                case 'all':
                    results = await clearAllUserData(selectedUserId);
                    showToast(`✅ Cleared all data for user`);
                    break;
                case 'chats':
                    const chatsCount = await clearUserChats(selectedUserId);
                    results = { chats: chatsCount };
                    showToast(`✅ Cleared ${chatsCount} chat(s) for user`);
                    break;
                case 'friends':
                    await clearUserFriendsAndRequests(selectedUserId);
                    results = { friends: true };
                    showToast(`✅ Cleared friends and requests`);
                    break;
                case 'posts':
                    const postsCount = await clearUserPosts(selectedUserId);
                    results = { posts: postsCount };
                    showToast(`✅ Cleared ${postsCount} post(s)`);
                    break;
                case 'notifications':
                    await clearUserNotifications(selectedUserId);
                    results = { notifications: true };
                    showToast(`✅ Cleared notifications`);
                    break;
            }
            
            displayResult(results, selectedUserId);
            
        } catch (error) {
            console.error("Clear error:", error);
            showToast("Error clearing data: " + error.message, true);
        }
    });
    
    document.getElementById('clearAllUsersBtn').addEventListener('click', async () => {
        if (currentUser?.uid !== ADMIN_UID) {
            showToast("Admin access required", true);
            return;
        }
        
        if (!confirm("⚠️⚠️⚠️ DANGER: This will clear ALL user data (chats, friends, posts) for ALL users except admin. This is IRREVERSIBLE! Type 'CONFIRM' to proceed.")) {
            return;
        }
        
        const confirmation = prompt('Type "CONFIRM" to proceed:');
        if (confirmation !== 'CONFIRM') {
            showToast("Operation cancelled", true);
            return;
        }
        
        try {
            const count = await clearAllUsersData();
            showToast(`✅ Cleared all data for ${count} users`);
            
            document.getElementById('result').innerHTML = `
                <strong>✅ COMPLETE RESET</strong><br><br>
                Cleared all data for ${count} users.<br>
                All chats, friends, friend requests, and posts have been removed.<br><br>
                <strong>⚠️ Refresh the page to see changes.</strong>
            `;
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').classList.add('success');
            
        } catch (error) {
            console.error("Clear all error:", error);
            showToast("Error clearing all data: " + error.message, true);
        }
    });
    
    // Initialize
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await fetchAllUsers();
            
            if (user.uid !== ADMIN_UID) {
                const clearAllBtn = document.getElementById('clearAllUsersBtn');
                clearAllBtn.disabled = true;
                clearAllBtn.title = "Admin only";
            }
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
</html>
