<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SocialNest • Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("naru.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        
        .dashboard {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 1;
            padding-bottom: 80px;
        }
        
        /* Logo Header */
        .logo-header {
            text-align: center;
            padding: 20px 0 10px 0;
            margin-bottom: 20px;
        }
        
        .logo-fancy {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Create Post Card */
        .create-post-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .create-post-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .profile-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #667eea;
        }
        
        .status-input {
            flex: 1;
            border: none;
            background: #f0f2f5;
            border-radius: 28px;
            padding: 14px 18px;
            resize: none;
            font-size: 14px;
            outline: none;
        }
        
        .post-button-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
            gap: 12px;
        }
        
        .post-submit-btn {
            background: linear-gradient(95deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .privacy-select {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        
        .create-post-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            justify-content: space-around;
            border-top: 1px solid #eef2f6;
            padding-top: 14px;
        }
        
        .action-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            color: #5b6778;
            transition: 0.2s;
        }
        
        .action-btn:hover {
            background: #f0f2f5;
        }
        
        /* Feed Tabs */
        .feed-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            color: #1e293b;
            transition: 0.2s;
        }
        
        .tab-btn.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        /* Live Streamer Card */
        .live-streamer-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.2s;
            cursor: pointer;
        }
        
        .live-streamer-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .live-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff2e2e;
        }
        
        .live-info {
            flex: 1;
        }
        
        .live-name {
            font-weight: 700;
            font-size: 16px;
            color: #1e293b;
        }
        
        .live-username {
            font-size: 12px;
            color: #64748b;
        }
        
        .live-viewers {
            font-size: 12px;
            color: #ff2e2e;
            margin-top: 4px;
        }
        
        .live-badge-text {
            background: #ff2e2e;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 8px;
        }
        
        .watch-live-btn {
            background: linear-gradient(135deg, #ff2e2e, #dc2626);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .watch-live-btn:hover {
            transform: scale(1.05);
        }
        
        /* Post Card */
        .post-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        
        .post-time {
            font-size: 11px;
            color: #8a99b4;
        }
        
        .post-content p {
            margin: 8px 0;
            word-break: break-word;
            line-height: 1.4;
        }
        
        .post-content img,
        .post-content video {
            max-width: 100%;
            border-radius: 16px;
            max-height: 350px;
            margin-top: 8px;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            font-size: 13px;
            color: #5e6f8d;
        }
        
        .post-actions {
            display: flex;
            gap: 16px;
            border-top: 1px solid #eef2f6;
            padding-top: 12px;
            flex-wrap: wrap;
        }
        
        .post-action {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
        }
        
        .post-action.liked {
            color: #e0245e;
            background: #ffe6f0;
        }
        
        .comment-section {
            margin-top: 16px;
            background: rgba(250, 251, 252, 0.9);
            border-radius: 20px;
            padding: 14px;
            display: none;
        }
        
        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid #eef2f6;
            font-size: 13px;
        }
        
        .comment-input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .comment-input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 30px;
            padding: 10px;
            outline: none;
        }
        
        .comment-input-area button {
            background: #667eea;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 100;
        }
        
        .nav-icon {
            font-size: 17px;
            cursor: pointer;
            padding: 10px;
            border-radius: 30%;
            transition: 0.2s;
            color: grey;
            position: relative;
        }
        
        .nav-icon:hover {
            background: lightgrey;
            transform: scale(1.1);
        }
        
        .profile-nav-img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .nav-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            min-width: 16px;
            height: 16px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        
        /* Owner Spotlight */
        .owner-spotlight {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #fbbf24;
            display: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #6c757d;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 24px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            font-size: 13px;
            pointer-events: none;
        }
        
        .privacy-badge {
            font-size: 10px;
            background: #eef2ff;
            border-radius: 20px;
            padding: 2px 8px;
            margin-left: 6px;
        }
        
        .media-preview {
            margin-top: 12px;
            position: relative;
            display: inline-block;
        }
        
        #postMediaInput {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
        
        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f2f5 25%, #e4e6eb 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-post {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
        }
        
        .skeleton-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }
        
        .skeleton-text {
            height: 14px;
            margin: 8px 0;
            border-radius: 7px;
        }
        
        .skeleton-name {
            width: 120px;
            height: 16px;
        }
        
        .skeleton-line {
            height: 12px;
            margin: 6px 0;
            border-radius: 6px;
        }
        
        .skeleton-live-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .skeleton-live-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }
        
        .content-loaded {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Dashboard Content -->
<div class="dashboard">
    <div class="logo-header">
        <div class="logo-fancy">
            <i class="fas fa-feather-alt"></i>
            <span class="logo-text">SocialNest</span>
        </div>
    </div>

    <!-- Create Post Card -->
    <div class="create-post-card">
        <div class="create-post-row">
            <img id="profileImage" class="profile-img" src="https://ui-avatars.com/api/?background=667eea&color=fff">
            <textarea id="text-caption" class="status-input" placeholder="What's on your mind?" rows="2"></textarea>
        </div>
        <div id="mediaPreviewContainer" class="media-preview" style="display:none;"></div>
        <div class="post-button-row">
            <select id="privacySelect" class="privacy-select">

    <!-- Owner Spotlight -->
    <div id="ownerSpotlight" class="owner-spotlight" style="display: none;">
        <div style="display: flex; align-items: center; gap: 16px;">
            <div style="position: relative;">
                <img id="ownerAvatar" src="https://ui-avatars.com/api/?background=fbbf24&color=fff&name=OE" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid gold;">
                <span style="position: absolute; bottom: -5px; right: -5px; font-size: 20px;">👑</span>
            </div>
            <div style="flex: 1;">
                <div style="font-weight: 700; font-size: 16px;">Obinna Eze <span style="background: #fbbf24; padding: 2px 8px; border-radius: 20px; font-size: 10px;">Creator</span></div>
                <div style="font-size: 11px; color: #64748b;">Founder of SocialNest</div>
            </div>
            <button id="visitCreatorBtn" style="background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none; padding: 8px 16px; border-radius: 30px; color: #1e293b; font-weight: 600; cursor: pointer;">Visit</button>

    <!-- Feed Tabs -->
    <div class="feed-tabs">

    <!-- Posts Container -->
    <div id="postsContainer"></div>
    
    <!-- Live Now Container -->
    <div id="liveNowContainer" style="display: none;"></div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-icon" id="navHome"><i class="fas fa-home"></i></div>
    <div class="nav-icon" id="watchReels"><i class="fas fa-video"></i></div>
    <div class="nav-icon" id="navFindFriends"><i class="fas fa-user-plus"></i><span id="friendReqBadge" class="nav-badge" style="display:none;">0</span></div>
    <div class="nav-icon" id="navChat"><i class="fas fa-paper-plane"></i><span id="chatBadge" class="nav-badge" style="display:none;">0</span></div>
    <div class="nav-icon" id="navNotifications"><i class="fas fa-bell"></i><span id="notifBadge" class="nav-badge" style="display:none;">0</span></div>
    <div class="nav-icon" id="navProfileBtn"><img id="bottomProfileImg" class="profile-nav-img" src="https://ui-avatars.com/api/?background=667eea&color=fff"></div>
</div>

<div id="toastMsg" class="toast"></div>

<!-- Modals -->
<div id="notificationsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; border-radius:28px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto;">
        <div style="padding:16px; border-bottom:1px solid #eef2f6; display:flex; justify-content:space-between;">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <button onclick="closeModal('notificationsModal')">✕</button>
        </div>
        <div id="notificationsList" style="padding:12px;"></div>
    </div>
</div>

<div id="friendRequestsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; border-radius:28px; width:90%; max-width:400px; max-height:80vh; overflow-y:auto;">
        <div style="padding:16px; border-bottom:1px solid #eef2f6; display:flex; justify-content:space-between;">
            <h3><i class="fas fa-user-plus"></i> Friend Requests</h3>
            <button onclick="closeModal('friendRequestsModal')">✕</button>
        </div>
        <div id="friendRequestsList" style="padding:12px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCDrwe_zHHoXDeKZBiKBjoXWkyVCZGoPps",
        authDomain: "obinna-web.firebaseapp.com",
        databaseURL: "https://obinna-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "obinna-web",
        storageBucket: "obinna-web.firebasestorage.app",
        messagingSenderId: "1066859676740",
        appId: "1:1066859676740:web:0479ddb0a1bc9020fe6811"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    window.db = db;
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    
    let currentUser = null;
    let currentFeed = 'public';
    let pendingMedia = null;
    let pendingMediaType = null;
    let allPosts = [];
    const CREATOR_UID = "6JkPCRetiCOX65opu4ofqAiTXaY2";
    
    function showToast(msg, isError = false) {
        let t = document.getElementById('toastMsg');
        if (!t) return;
        t.textContent = msg;
        t.style.background = isError ? '#dc2626' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }
    
    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function getTimeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return 'Just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        return `${days}d ago`;
    }
    
    async function checkBanned() {
        if (!currentUser) return false;
        const userSnap = await get(ref(db, `users/${currentUser.uid}/banned`));
        if (userSnap.val() === true) {
            showToast("Your account has been banned. You will be logged out.", true);
            setTimeout(() => {
                auth.signOut();
                window.location.href = 'login.html';
            }, 2000);
            return true;
        }
        return false;
    }
    
    // ========== LIVE NOW FUNCTIONS ==========
    function showLiveSkeleton() {
        const container = document.getElementById('liveNowContainer');
        if (!container) return;
        let skeletons = '';
        for (let i = 0; i < 3; i++) {
            skeletons += `
                <div class="skeleton-live-card">
                    <div class="skeleton skeleton-live-avatar"></div>
                    <div style="flex: 1;">
                        <div class="skeleton skeleton-name" style="width: 60%;"></div>
                        <div class="skeleton skeleton-text" style="width: 40%; margin-top: 6px;"></div>
                        <div class="skeleton skeleton-text" style="width: 30%; margin-top: 6px;"></div>
                    </div>
                    <div class="skeleton skeleton-text" style="width: 80px; height: 36px; border-radius: 40px;"></div>
                </div>
            `;
        }
        container.innerHTML = skeletons;
    }
    
    async function loadLiveStreams() {
        const container = document.getElementById('liveNowContainer');
        if (!container || !currentUser) return;
        
        showLiveSkeleton();
        
        const liveStreamsRef = ref(db, 'liveStreams');
        const snapshot = await get(liveStreamsRef);
        const streams = snapshot.val() || {};
        
        // Filter active streams and exclude current user's own stream
        const activeStreams = [];
        for (const [streamId, stream] of Object.entries(streams)) {
            if (stream.active === true && stream.hostId !== currentUser.uid) {
                activeStreams.push({ id: streamId, ...stream });
            }
        }
        
        if (activeStreams.length === 0) {
            container.innerHTML = '<div class="empty-state">🔴 No one is live right now. Start a live stream!</div>';
            return;
        }
        
        container.innerHTML = '';
        
        for (const stream of activeStreams) {
            const userSnap = await get(ref(db, `users/${stream.hostId}`));
            const user = userSnap.val();
            
            if (user) {
                const card = document.createElement('div');
                card.className = 'live-streamer-card';
                card.innerHTML = `
                    <img class="live-avatar" src="${user.profilePic || 'https://ui-avatars.com/api/?background=667eea&color=fff'}" alt="${escapeHTML(user.displayName || user.username)}">
                    <div class="live-info">
                        <div class="live-name">${escapeHTML(user.displayName || user.username)} <span class="live-badge-text">LIVE</span></div>
                        <div class="live-username">@${escapeHTML(user.username)}</div>
                        <div class="live-viewers"><i class="fas fa-eye"></i> ${stream.viewerCount || 0} watching</div>
                    </div>
                    <button class="watch-live-btn" data-stream-id="${stream.id}">Watch Live</button>
                `;
                container.appendChild(card);
            }
        }
        
        // Add click handlers
        document.querySelectorAll('.watch-live-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const streamId = btn.dataset.streamId;
                window.location.href = `live-watch.html?id=${streamId}`;
            });
        });
        
        // Also make the whole card clickable
        document.querySelectorAll('.live-streamer-card').forEach(card => {
            card.addEventListener('click', () => {
                const btn = card.querySelector('.watch-live-btn');
                if (btn) {
                    window.location.href = `live-watch.html?id=${btn.dataset.streamId}`;
                }
            });
        });
    }
    
    function listenToLiveStreams() {
        const liveStreamsRef = ref(db, 'liveStreams');
        onValue(liveStreamsRef, () => {
            if (currentFeed === 'live') {
                loadLiveStreams();
            }
        });
    }
    
    // ========== POSTS FUNCTIONS ==========
    function showSkeletonPosts() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        let skeletons = '';
        for (let i = 0; i < 3; i++) {
            skeletons += `
                <div class="skeleton-post">
                    <div class="post-header">
                        <div class="skeleton skeleton-avatar"></div>
                        <div style="flex:1;">
                            <div class="skeleton skeleton-name"></div>
                            <div class="skeleton skeleton-text" style="width: 40%; margin-top: 6px;"></div>
                        </div>
                    </div>
                    <div class="skeleton skeleton-line" style="width: 90%;"></div>
                    <div class="skeleton skeleton-line" style="width: 70%;"></div>
                    <div class="skeleton skeleton-line" style="width: 50%;"></div>
                    <div style="display: flex; gap: 20px; margin-top: 12px;">
                        <div class="skeleton skeleton-text" style="width: 60px;"></div>
                        <div class="skeleton skeleton-text" style="width: 60px;"></div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = skeletons;
    }
    
    async function renderFeed() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        
        showSkeletonPosts();
        
        let postsArray = [...allPosts];
        
        if (currentFeed === 'my') {
            postsArray = postsArray.filter(p => p.userId === currentUser?.uid);
        } else if (currentFeed === 'public') {
            postsArray = postsArray.filter(p => p.privacy === 'public');
            postsArray = postsArray.sort(() => Math.random() - 0.5);
        }
        
        if (postsArray.length === 0) {
            container.innerHTML = '<div class="empty-state">No posts to show</div>';
            return;
        }
        
        container.innerHTML = '';
        
        for (const post of postsArray) {
            const postId = post.id;
            const isOwn = post.userId === currentUser?.uid;
            const timeAgo = getTimeAgo(new Date(post.timestamp));
            
            const card = document.createElement('div');
            card.className = 'post-card';
            card.dataset.postId = postId;
            
            card.innerHTML = `
                <div class="post-header" id="post-header-${postId}">
                    <div class="skeleton skeleton-avatar" style="width:44px; height:44px;"></div>
                    <div style="flex:1;">
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-text" style="width: 40%;"></div>
                    </div>
                </div>
                <div class="post-content">
                    <p>${escapeHTML(post.content)}</p>
                    ${post.media ? (post.mediaType === 'image' ? `<img src="${post.media}" style="max-width:100%; border-radius:16px; margin-top:8px;">` : `<video src="${post.media}" controls style="max-width:100%; border-radius:16px; margin-top:8px;"></video>`) : ''}
                </div>
                <div class="post-stats">
                    <span>❤️ ${post.likes?.length || 0}</span>
                    <span>💬 ${post.comments?.length || 0}</span>
                </div>
                <div class="post-actions">
                    <button class="post-action like-btn ${post.likes?.includes(currentUser?.uid) ? 'liked' : ''}" data-post-id="${postId}">❤️ Like</button>
                    <button class="post-action comment-toggle" data-post-id="${postId}">💬 Comment</button>
                    ${isOwn ? `<button class="post-action delete-btn" data-post-id="${postId}">🗑️ Delete</button>` : ''}
                </div>
                <div class="comment-section" style="display:none;">
                    <div class="comment-list">${post.comments?.map(c => `<div class="comment-item"><strong>${escapeHTML(c.userName)}</strong>: ${escapeHTML(c.text)}</div>`).join('') || '<div style="color:#8a99b4;">No comments yet</div>'}</div>
                    <div class="comment-input-area">
                        <input type="text" placeholder="Write a comment..." data-comment-input>
                        <button data-submit-comment data-post-id="${postId}">Post</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
            
            const userSnap = await get(ref(db, `users/${post.userId}`));
            const userData = userSnap.val();
            if (userData) {
                const profilePic = userData.profilePic || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${userData.displayName?.charAt(0) || 'U'}`;
                const displayName = userData.displayName || userData.username || "User";
                const username = userData.username || "user";
                const headerDiv = card.querySelector(`.post-header`);
                if (headerDiv) {
                    headerDiv.innerHTML = `
                        <img class="post-avatar" src="${profilePic}" style="width:44px; height:44px; border-radius:50%; cursor:pointer;" onclick="window.location.href='view-profile.html?uid=${post.userId}'">
                        <div>
                            <strong style="cursor:pointer;" onclick="window.location.href='view-profile.html?uid=${post.userId}'">${escapeHTML(displayName)}</strong>
                            ${!isOwn ? `<small>@${escapeHTML(username)}</small>` : ''}
                            <br><span class="post-time">${timeAgo} <span class="privacy-badge">${post.privacy === 'public' ? '🌍 Public' : '🔒 Private'}</span></span>
                        </div>
                    `;
                }
            }
        }
        
        attachPostEvents();
    }
    
    function attachPostEvents() {
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async () => {
                const postId = btn.dataset.postId;
                const postRef = ref(db, `posts/${postId}`);
                const snap = await get(postRef);
                const post = snap.val();
                if (!post) return;
                const currentLikes = post.likes || [];
                const newLikes = currentLikes.includes(currentUser.uid) 
                    ? currentLikes.filter(id => id !== currentUser.uid)
                    : [...currentLikes, currentUser.uid];
                await update(postRef, { likes: newLikes });
            };
        });
        
        document.querySelectorAll('.comment-toggle').forEach(btn => {
            btn.onclick = (e) => {
                const card = e.target.closest('.post-card');
                const commentSection = card.querySelector('.comment-section');
                if (commentSection) commentSection.style.display = commentSection.style.display === 'none' ? 'block' : 'none';
            };
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = async () => {
                if (confirm('Delete this post?')) {
                    await remove(ref(db, `posts/${btn.dataset.postId}`));
                    showToast('Post deleted');
                }
            };
        });
        
        document.querySelectorAll('[data-submit-comment]').forEach(btn => {
            btn.onclick = async () => {
                const postId = btn.dataset.postId;
                const card = btn.closest('.post-card');
                const input = card.querySelector('[data-comment-input]');
                const text = input.value.trim();
                if (!text) return;
                const postRef = ref(db, `posts/${postId}`);
                const snap = await get(postRef);
                const post = snap.val();
                const comments = post.comments || [];
                const newComment = {
                    id: Date.now().toString(),
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.username,
                    userProfilePic: currentUser.profilePic,
                    text: text,
                    timestamp: new Date().toISOString()
                };
                await update(postRef, { comments: [...comments, newComment] });
                input.value = '';
                showToast('Comment added');
            };
        });
    }
    
    function listenToPosts() {
        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const posts = snapshot.val();
            if (!posts) {
                allPosts = [];
                if (currentFeed === 'public' || currentFeed === 'my') {
                    renderFeed();
                }
                return;
            }
            allPosts = Object.values(posts);
            if (currentFeed === 'public' || currentFeed === 'my') {
                renderFeed();
            }
        });
    }
    
    async function createPost(content, mediaData, mediaType, isPublic) {
        if (await checkBanned()) return false;
        
        if (!content && !mediaData) {
            showToast("Please enter something or add media", true);
            return false;
        }
        if (!currentUser) return false;
        
        const postsRef = ref(db, 'posts');
        const newPostRef = push(postsRef);
        const postData = {
            id: newPostRef.key,
            content: content || "",
            media: mediaData || null,
            mediaType: mediaType || null,
            userId: currentUser.uid,
            timestamp: new Date().toISOString(),
            likes: [],
            comments: [],
            privacy: isPublic ? 'public' : 'private'
        };
        await set(newPostRef, postData);
        showToast(isPublic ? "✅ Posted publicly!" : "✅ Private post");
        
        pendingMedia = null;
        pendingMediaType = null;
        document.getElementById('text-caption').value = '';
        const preview = document.getElementById('mediaPreviewContainer');
        if (preview) {
            preview.style.display = 'none';
            preview.innerHTML = '';
        }
        return true;
    }
    
    async function loadUserData(user) {
        const userRef = ref(db, `users/${user.uid}`);
        const snapshot = await get(userRef);
        if (snapshot.exists()) {
            currentUser = { uid: user.uid, ...snapshot.val() };
        } else {
            const defaultName = user.email?.split('@')[0] || 'User';
            currentUser = {
                uid: user.uid,
                displayName: defaultName,
                username: defaultName.toLowerCase(),
                profilePic: `https://ui-avatars.com/api/?background=667eea&color=fff&name=${defaultName.charAt(0)}`,
                bio: '',
                location: '',
                friends: [],
                friendRequests: []
            };
            await set(ref(db, `users/${user.uid}`), currentUser);
        }
        window.currentUser = currentUser;
        
        const profileImg = document.getElementById('profileImage');
        const bottomImg = document.getElementById('bottomProfileImg');
        if (profileImg) profileImg.src = currentUser.profilePic;
        if (bottomImg) bottomImg.src = currentUser.profilePic;
        
        if (currentUser.uid !== CREATOR_UID) {
            const spotlight = document.getElementById('ownerSpotlight');
            if (spotlight) spotlight.style.display = 'block';
        }
        
        listenToPosts();
        listenToLiveStreams();
    }
    
    function setupEvents() {
        const submitBtn = document.getElementById('submitPostBtn');
        if (submitBtn) {
            submitBtn.onclick = () => {
                const content = document.getElementById('text-caption').value.trim();
                const privacySelect = document.getElementById('privacySelect');
                const isPublic = privacySelect.value === 'public';
                createPost(content, pendingMedia, pendingMediaType, isPublic);
            };
        }
        
        const photoBtn = document.getElementById('photoVideoBtn');
        const mediaInput = document.getElementById('postMediaInput');
        if (photoBtn && mediaInput) {
            photoBtn.onclick = () => mediaInput.click();
            mediaInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingMedia = ev.target.result;
                        pendingMediaType = file.type.startsWith('image') ? 'image' : 'video';
                        const preview = document.getElementById('mediaPreviewContainer');
                        if (preview) {
                            preview.style.display = 'block';
                            preview.innerHTML = `<div style="position:relative; display:inline-block;">
                                ${pendingMediaType === 'image' ? `<img src="${pendingMedia}" style="max-width:200px; border-radius:16px;">` : `<video src="${pendingMedia}" controls style="max-width:200px; border-radius:16px;"></video>`}
                                <button onclick="clearPendingMedia()" style="position:absolute; top:-8px; right:-8px; background:red; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer;">✕</button>
                            </div>`;
                        }
                        showToast("Media added! Click Post to share");
                    };
                    reader.readAsDataURL(file);
                }
                mediaInput.value = '';
            };
        }
        
        const feelingBtn = document.getElementById('feelingBtn');
        if (feelingBtn) {
            feelingBtn.onclick = () => {
                const feel = prompt("How are you feeling?");
                if (feel) {
                    const caption = document.getElementById('text-caption');
                    if (caption) caption.value = `Feeling ${feel}`;
                }
            };
        }
        
        const liveBtn = document.getElementById('liveBtn');
        if (liveBtn) {
            liveBtn.onclick = () => {
                window.location.href = 'live-host.html';
            };
        }
        
        const myFeedTab = document.getElementById('myFeedTab');
        const publicFeedTab = document.getElementById('publicFeedTab');
        const liveNowTab = document.getElementById('liveNowTab');
        const postsContainer = document.getElementById('postsContainer');
        const liveNowContainer = document.getElementById('liveNowContainer');
        
        if (myFeedTab && publicFeedTab && liveNowTab) {
            myFeedTab.onclick = () => {
                currentFeed = 'my';
                myFeedTab.classList.add('active');
                publicFeedTab.classList.remove('active');
                liveNowTab.classList.remove('active');
                postsContainer.style.display = 'block';
                liveNowContainer.style.display = 'none';
                renderFeed();
            };
            
            publicFeedTab.onclick = () => {
                currentFeed = 'public';
                publicFeedTab.classList.add('active');
                myFeedTab.classList.remove('active');
                liveNowTab.classList.remove('active');
                postsContainer.style.display = 'block';
                liveNowContainer.style.display = 'none';
                renderFeed();
            };
            
            liveNowTab.onclick = () => {
                currentFeed = 'live';
                liveNowTab.classList.add('active');
                myFeedTab.classList.remove('active');
                publicFeedTab.classList.remove('active');
                postsContainer.style.display = 'none';
                liveNowContainer.style.display = 'block';
                loadLiveStreams();
            };
        }
        
        document.getElementById('navHome').onclick = () => window.location.reload();
        document.getElementById('watchReels').onclick = () => window.location.href = 'reels.html';
        document.getElementById('navFindFriends').onclick = () => window.location.href = 'find-friends.html';
        document.getElementById('navChat').onclick = () => window.location.href = 'chat.html';
        document.getElementById('navProfileBtn').onclick = () => window.location.href = 'profile.html';
        document.getElementById('navNotifications').onclick = () => document.getElementById('notificationsModal').style.display = 'flex';
        
        const visitBtn = document.getElementById('visitCreatorBtn');
        if (visitBtn) {
            visitBtn.onclick = () => window.location.href = 'view-profile.html?uid=6JkPCRetiCOX65opu4ofqAiTXaY2';
        }
    }
    
    window.clearPendingMedia = function() {
        pendingMedia = null;
        pendingMediaType = null;
        const container = document.getElementById('mediaPreviewContainer');
        if (container) {
            container.style.display = 'none';
            container.innerHTML = '';
        }
        showToast("Media removed");
    };
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await loadUserData(user);
            setupEvents();
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
</html>
