<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SocialNest • Go Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    /* Add these to any page that's not fitting */
html, body {
width: 100%;
overflow-x: hidden;
}

* {
max-width: 100%;
box-sizing: border-box;
}

img, video, iframe {
max-width: 100%;
height: auto;
}

@media (max-width: 768px) {
.container {
padding-left: 12px;
padding-right: 12px;
}
}
    
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; height: 100vh; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .controls { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 20; }
        .ctrl-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: white; font-size: 28px; cursor: pointer; }
        .ctrl-btn.end { background: #dc2626; }
        .host-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px 18px; display: flex; align-items: center; gap: 12px; z-index: 20; }
        .host-avatar { width: 44px; height: 44px; border-radius: 50%; }
        .host-name { color: white; font-weight: 600; }
        .live-badge { background: #ff2e2e; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .viewer-count { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 40px; color: white; z-index: 20; }
        .chat-panel { position: absolute; bottom: 100px; right: 20px; width: 320px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; z-index: 30; }
        .chat-header { padding: 12px 16px; background: rgba(0,0,0,0.5); color: white; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-message { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 18px; font-size: 13px; color: white; }
        .chat-message strong { color: #facc15; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; background: rgba(255,255,255,0.15); border: none; padding: 10px 14px; border-radius: 30px; color: white; outline: none; }
        .chat-input-area button { background: #667eea; border: none; padding: 10px 18px; border-radius: 30px; color: white; cursor: pointer; }
        .toggle-chat { position: absolute; bottom: 110px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #667eea; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 35; }
        .requests-panel { position: absolute; top: 80px; right: 20px; width: 260px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-radius: 20px; z-index: 25; overflow: hidden; }
        .requests-header { padding: 12px 16px; background: rgba(0,0,0,0.5); color: white; border-bottom: 1px solid #333; }
        .requests-list { max-height: 300px; overflow-y: auto; }
        .request-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #333; color: white; }
        .accept-request { background: #10b981; border: none; padding: 6px 14px; border-radius: 30px; color: white; cursor: pointer; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; opacity: 0; transition: 0.2s; }
        @media (max-width: 550px) { .chat-panel { width: calc(100% - 40px); } .requests-panel { width: calc(100% - 40px); } }
        .error-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 100; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="host-badge"><img id="hostAvatar" class="host-avatar"><div class="host-name"><span id="hostName"></span><span class="live-badge">LIVE</span></div></div>
    <div class="viewer-count" id="viewerCount">👁️ 0 watching</div>
    <div class="controls"><button class="ctrl-btn end" id="endLiveBtn"><i class="fas fa-times"></i></button></div>
    <button class="toggle-chat" id="toggleChatBtn"><i class="fas fa-comment"></i></button>
    <div class="chat-panel" id="chatPanel" style="display: none;">
        <div class="chat-header"><span><i class="fas fa-comments"></i> Live Chat</span><button id="closeChatBtn" style="background:none; border:none; color:white; font-size:20px;">✕</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Say something..."><button id="sendChatBtn">Send</button></div>
    </div>
    <div class="requests-panel" id="requestsPanel"><div class="requests-header"><i class="fas fa-user-plus"></i> Join Requests</div><div class="requests-list" id="requestsList">No requests yet</div></div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCDrwe_zHHoXDeKZBiKBjoXWkyVCZGoPps",
        authDomain: "obinna-web.firebaseapp.com",
        databaseURL: "https://obinna-web-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "obinna-web",
        storageBucket: "obinna-web.firebasestorage.app",
        messagingSenderId: "1066859676740",
        appId: "1:1066859676740:web:0479ddb0a1bc9020fe6811"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let liveStreamId = null;
    let localStream = null;
    let peerConnections = new Map();
    const configuration = { 
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ],
        iceCandidatePoolSize: 10
    };

    function showToast(msg, isError = false) {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.style.background = isError ? '#dc2626' : '#1e293b';
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    async function startBroadcast() {
        try {
            // Check if HTTPS
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                showToast("⚠️ WebRTC requires HTTPS. Please use HTTPS connection.", true);
                return;
            }

            showToast("Requesting camera and microphone access...");
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            showToast("✅ Camera and microphone active!");

            liveStreamId = `live_${currentUser.uid}_${Date.now()}`;
            await set(ref(db, `liveStreams/${liveStreamId}`), {
                hostId: currentUser.uid,
                hostName: currentUser.displayName || currentUser.username,
                hostProfilePic: currentUser.profilePic,
                startedAt: Date.now(),
                active: true,
                viewerCount: 0
            });

            // Listen for join requests
            onValue(ref(db, `liveStreams/${liveStreamId}/joinRequests`), (snap) => {
                const requests = snap.val() || {};
                renderRequests(requests);
            });

            // Listen for chat
            onValue(ref(db, `liveStreams/${liveStreamId}/chat`), (snap) => {
                const msgs = snap.val() || {};
                renderChat(msgs);
            });

            // Listen for viewers count
            onValue(ref(db, `liveStreams/${liveStreamId}/viewers`), (snap) => {
                const viewers = snap.val() || {};
                document.getElementById('viewerCount').innerHTML = `👁️ ${Object.keys(viewers).length} watching`;
            });

            showToast("🔴 You are live now! Share the stream ID: " + liveStreamId);
        } catch (err) {
            console.error("Permission error:", err);
            if (err.name === 'NotAllowedError') {
                showToast("❌ Camera/Microphone access denied. Please allow permissions and refresh.", true);
            } else if (err.name === 'NotFoundError') {
                showToast("❌ No camera or microphone found on this device.", true);
            } else {
                showToast("❌ Error: " + err.message, true);
            }
        }
    }

    function renderRequests(requests) {
        const container = document.getElementById('requestsList');
        const entries = Object.entries(requests);
        if (entries.length === 0) {
            container.innerHTML = '<div style="padding:12px; text-align:center; color:#aaa;">No pending requests</div>';
            return;
        }
        container.innerHTML = entries.map(([reqId, req]) => `
            <div class="request-item">
                <div><strong>${escapeHtml(req.userName)}</strong> wants to join</div>
                <button class="accept-request" data-req-id="${reqId}" data-viewer-id="${req.userId}">Accept</button>
            </div>
        `).join('');
        document.querySelectorAll('.accept-request').forEach(btn => {
            btn.onclick = async () => {
                const reqId = btn.dataset.reqId;
                const viewerId = btn.dataset.viewerId;
                await acceptViewer(viewerId, reqId);
            };
        });
    }

    async function acceptViewer(viewerId, reqId) {
        await remove(ref(db, `liveStreams/${liveStreamId}/joinRequests/${reqId}`));
        await set(ref(db, `liveStreams/${liveStreamId}/viewers/${viewerId}`), { joinedAt: Date.now() });
        await createOfferForViewer(viewerId);
        showToast(`Accepted ${viewerId.substring(0,6)}`);
    }

    async function createOfferForViewer(viewerId) {
        try {
            const pc = new RTCPeerConnection(configuration);
            peerConnections.set(viewerId, pc);

            // Add all tracks from local stream
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const candRef = ref(db, `liveStreams/${liveStreamId}/viewers/${viewerId}/iceCandidates`);
                    push(candRef, event.candidate.toJSON());
                }
            };

            pc.oniceconnectionstatechange = () => {
                console.log(`ICE state for ${viewerId}: ${pc.iceConnectionState}`);
                if (pc.iceConnectionState === 'failed') {
                    console.error(`ICE failed for ${viewerId}`);
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await update(ref(db, `liveStreams/${liveStreamId}/viewers/${viewerId}`), {
                offer: { type: offer.type, sdp: offer.sdp },
                answer: null
            });

            // Listen for answer
            const viewerRef = ref(db, `liveStreams/${liveStreamId}/viewers/${viewerId}`);
            onValue(viewerRef, (snap) => {
                const data = snap.val();
                if (data && data.answer && pc) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
        } catch (err) {
            console.error("Error creating offer:", err);
        }
    }

    function renderChat(msgs) {
        const container = document.getElementById('chatMessages');
        const messages = Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp);
        container.innerHTML = messages.map(m => `<div class="chat-message"><strong>${escapeHtml(m.userName)}</strong>: ${escapeHtml(m.text)}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendChatMessage(text) {
        if (!text.trim() || !liveStreamId) return;
        await push(ref(db, `liveStreams/${liveStreamId}/chat`), {
            userId: currentUser.uid,
            userName: currentUser.displayName || currentUser.username,
            text: text.trim(),
            timestamp: Date.now()
        });
        document.getElementById('chatInput').value = '';
    }

    async function endLive() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        peerConnections.forEach(pc => pc.close());
        if (liveStreamId) await remove(ref(db, `liveStreams/${liveStreamId}`));
        showToast("Live ended");
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }

    document.getElementById('endLiveBtn').onclick = endLive;
    document.getElementById('sendChatBtn').onclick = () => sendChatMessage(document.getElementById('chatInput').value);
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(e.target.value); });
    const toggleChat = document.getElementById('toggleChatBtn'), chatPanel = document.getElementById('chatPanel'), closeChat = document.getElementById('closeChatBtn');
    toggleChat.onclick = () => chatPanel.style.display = chatPanel.style.display === 'flex' ? 'none' : 'flex';
    closeChat.onclick = () => chatPanel.style.display = 'none';

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await get(ref(db, `users/${user.uid}`));
            currentUser = { uid: user.uid, ...userSnap.val() };
            if (!currentUser.displayName) currentUser.displayName = currentUser.username;
            document.getElementById('hostAvatar').src = currentUser.profilePic || 'https://ui-avatars.com/api/';
            document.getElementById('hostName').innerText = currentUser.displayName;
            startBroadcast();
        } else window.location.href = 'login.html';
    });
</script>
</body>
</html>
